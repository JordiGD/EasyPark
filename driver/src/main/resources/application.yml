server:
    port: 9091

eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/

spring:
    application:
        name: driver-service
    datasource:
        url: jdbc:postgresql://localhost:5432/driverdb
        username: postgres
        password: password
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true