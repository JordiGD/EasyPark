# ==================== Application Config ====================
spring.application.name=driver
server.port=8080

# ==================== Database Configuration ====================
spring.datasource.url=jdbc:mysql://localhost:3306/easypark_db
spring.datasource.username=easypark_user
spring.datasource.password=easypark_pass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==================== Connection Pool ====================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==================== Logging ====================
logging.level.root=INFO
logging.level.co.edu.uptc.driver=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== CORS Configuration ====================
server.servlet.context-path=/
server.servlet.session.timeout=30m

# ==================== Jackson Configuration ====================
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC
