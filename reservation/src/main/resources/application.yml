spring:
  application:
    name: reservation-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:dbUser}:${MYSQL_PORT:3306}/${RESERVATION_DB_NAME:reservation_db}
    username: ${RESERVATION_DB_USER:reservation_user}
    password: ${RESERVATION_DB_PASSWORD:reservation_pass123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8082}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:reservation-service}
