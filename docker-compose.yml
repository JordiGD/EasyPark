services:
  # ==================== BASE DE DATOS ====================
  dbUser:
    image: mysql:8.0
    container_name: easypark-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - easypark-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ==================== BACKEND (Spring Boot) ====================
  backend:
    build:
      context: ./user
      dockerfile: Dockerfile
    container_name: easypark-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL}
      SERVER_PORT: ${SERVER_PORT_USER}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
      EUREKA_INSTANCE_HOSTNAME: user-service
    ports:
      - "${SERVER_PORT_USER}:${SERVER_PORT_USER}"
    depends_on:
      dbUser:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - easypark-network

  # ==================== EUREKA SERVER (Service Discovery) ====================
  eureka:
    build:
      context: ./eurekaserver
      dockerfile: Dockerfile
    container_name: easypark-eureka
    environment:
      SERVER_PORT: ${EUREKA_PORT}
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: 'false'
      EUREKA_CLIENT_FETCH_REGISTRY: 'false'
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
    ports:
      - "${EUREKA_PORT}:${EUREKA_PORT}"
    networks:
      - easypark-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==================== PARKING SERVICE (Spring Boot Microservice) ====================
  parking-service:
    build:
      context: ./parking
      dockerfile: Dockerfile
    container_name: easypark-parking
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${PARKING_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${PARKING_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PARKING_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL}
      SERVER_PORT: ${SERVER_PORT_PARKING}
      SPRING_APPLICATION_NAME: parking-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
      EUREKA_INSTANCE_HOSTNAME: parking-service
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    ports:
      - "${SERVER_PORT_PARKING}:${SERVER_PORT_PARKING}"
    depends_on:
      dbUser:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - easypark-network

  # ==================== RESERVATION SERVICE (Spring Boot Microservice) ====================
  reservation-service:
    build:
      context: ./reservation
      dockerfile: Dockerfile
    container_name: easypark-reservation
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${RESERVATION_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${RESERVATION_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${RESERVATION_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL}
      SERVER_PORT: ${SERVER_PORT_RESERVATION}
      SPRING_APPLICATION_NAME: reservation-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS}
      EUREKA_INSTANCE_HOSTNAME: reservation-service
    ports:
      - "${SERVER_PORT_RESERVATION}:${SERVER_PORT_RESERVATION}"
    depends_on:
      dbUser:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - easypark-network

  # ==================== OWNER APP (React) ====================
  owner-app:
    build:
      context: ./owner-app
      dockerfile: Dockerfile
    container_name: easypark-owner-app
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      PORT: ${OWNER_APP_PORT}
    ports:
      - "${OWNER_APP_PORT}:${OWNER_APP_PORT}"
    depends_on:
      - backend
    networks:
      - easypark-network

  # ==================== ADMIN APP (React) ====================
  admin-app:
    build:
      context: ./admin-app
      dockerfile: Dockerfile
    container_name: easypark-admin-app
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      PORT: ${ADMIN_APP_PORT}
    ports:
      - "${ADMIN_APP_PORT}:${ADMIN_APP_PORT}"
    depends_on:
      - backend
    networks:
      - easypark-network


  # ==================== NGINX (Proxy Reverso - Opcional) ====================
  nginx:
    image: nginx:alpine
    container_name: easypark-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - parking-service
      - reservation-service
      - owner-app
      - admin-app
      - eureka
    networks:
      - easypark-network
    profiles:
      - production

volumes:
  mysql_data:

networks:
  easypark-network:
    driver: bridge
