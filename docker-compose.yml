services:
  # ==================== BASE DE DATOS ====================
  dbUser:
    image: mysql:8.0
    container_name: easypark-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: easypark_db
      MYSQL_USER: easypark_user
      MYSQL_PASSWORD: easypark_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - easypark-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ==================== BACKEND (Spring Boot) ====================
  backend:
    build:
      context: ./user
      dockerfile: Dockerfile
    container_name: easypark-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://dbUser:3306/easypark_db
      SPRING_DATASOURCE_USERNAME: easypark_user
      SPRING_DATASOURCE_PASSWORD: easypark_pass123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: 'false'
      SERVER_PORT: 8080
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: 'true'
      EUREKA_INSTANCE_HOSTNAME: user-service
    ports:
      - "8080:8080"
    depends_on:
      dbUser:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - easypark-network

  # ==================== EUREKA SERVER (Service Discovery) ====================
  eureka:
    build:
      context: ./eurekaserver
      dockerfile: Dockerfile
    container_name: easypark-eureka
    environment:
      SERVER_PORT: 8761
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: 'false'
      EUREKA_CLIENT_FETCH_REGISTRY: 'false'
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: 'true'
    ports:
      - "8761:8761"
    networks:
      - easypark-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      timeout: 10s
      retries: 5
      start_period: 20s

  # ==================== PARKING SERVICE (Spring Boot Microservice) ====================
  parking-service:
    build:
      context: ./parking
      dockerfile: Dockerfile
    container_name: easypark-parking
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://dbUser:3306/parking_db
      SPRING_DATASOURCE_USERNAME: parking_user
      SPRING_DATASOURCE_PASSWORD: parking_pass123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: 'false'
      SERVER_PORT: 8081
      SPRING_APPLICATION_NAME: parking-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: 'true'
      EUREKA_INSTANCE_HOSTNAME: parking-service
    ports:
      - "8081:8081"
    depends_on:
      dbUser:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - easypark-network

  # ==================== OWNER APP (React) ====================
  owner-app:
    build:
      context: ./owner-app
      dockerfile: Dockerfile
    container_name: easypark-owner-app
    environment:
      REACT_APP_API_URL: http://localhost:8080
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - easypark-network
    volumes:
      - ./owner-app/src:/app/src

  # ==================== ADMIN APP (React) ====================
  admin-app:
    build:
      context: ./admin-app
      dockerfile: Dockerfile
    container_name: easypark-admin-app
    environment:
      REACT_APP_API_URL: http://localhost:8080
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - easypark-network
    volumes:
      - ./admin-app/src:/app/src

  # ==================== NGINX (Proxy Reverso - Opcional) ====================
  nginx:
    image: nginx:alpine
    container_name: easypark-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - parking-service
      - owner-app
      - admin-app
      - eureka
    networks:
      - easypark-network
    profiles:
      - production

volumes:
  mysql_data:

networks:
  easypark-network:
    driver: bridge
